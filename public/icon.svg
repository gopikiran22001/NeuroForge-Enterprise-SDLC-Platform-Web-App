  />
  <!-- 3D depth lines inside hexagon -->
  <line x1="256" y1="28" x2="256" y2="142" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="50" y1="148" x2="140" y2="200" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="462" y1="148" x2="372" y2="200" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="256" y1="142" x2="140" y2="200" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="256" y1="142" x2="372" y2="200" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="140" y1="200" x2="140" y2="388" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="372" y1="200" x2="372" y2="388" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="140" y1="388" x2="256" y2="508" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>
  <line x1="372" y1="388" x2="256" y2="508" stroke="#5b4ef8" stroke-width="36" stroke-linecap="round"/>

  <!-- Circuit N letter with nodes -->
  <!-- Top left node -->
  <circle cx="172" cy="185" r="20" fill="#5b4ef8"/>
  <!-- Top right node -->
  <circle cx="318" cy="175" r="20" fill="#5b4ef8"/>
  <!-- Bottom left node -->
  <circle cx="172" cy="355" r="20" fill="#5b4ef8"/>
  <!-- Bottom right node -->
  <circle cx="318" cy="345" r="20" fill="#5b4ef8"/>

  <!-- N stroke left vertical -->
  <line x1="172" y1="185" x2="172" y2="355" stroke="#5b4ef8" stroke-width="32" stroke-linecap="round"/>
  <!-- N diagonal -->
  <line x1="172" y1="185" x2="318" y2="345" stroke="#5b4ef8" stroke-width="32" stroke-linecap="round"/>
  <!-- N stroke right vertical -->
  <line x1="318" y1="175" x2="318" y2="345" stroke="#5b4ef8" stroke-width="32" stroke-linecap="round"/>

  <!-- Circuit branch top-right -->
  <line x1="318" y1="175" x2="360" y2="175" stroke="#5b4ef8" stroke-width="20" stroke-linecap="round"/>
